n_trials: 10
timeout: 3600
direction: maximize
study_name: ${experiment.name}_seed_${seed}
pruner:
  type: hyperband
  min_resource: 1
  max_resource: auto
  reduction_factor: 3
search_space:
  learning_rate:
    low: 1.0e-5
    high: 1.0e-3
    log: true
  weight_decay:
    low: 0.0
    high: 0.1
  num_train_epochs:
    low: 3
    high: 10
  max_length:
    choices:
      - 128
      - 256
      - 512
