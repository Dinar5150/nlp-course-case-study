enabled: false
n_trials: 10
timeout: 3600
direction: maximize
sampler: tpe
pruner: median
study_name: ${experiment.name}_seed_${seed}
search_space:
  learning_rate:
    low: 1.0e-5
    high: 8.0e-5
    log: true
  weight_decay:
    low: 0.0
    high: 0.1
  num_train_epochs:
    low: 2
    high: 6
  warmup_ratio:
    low: 0.0
    high: 0.2
  per_device_train_batch_size:
    choices:
      - 1
      - 2
      - 4
      - 8
  max_length:
    choices:
      - 96
      - 128
      - 160
      - 192
  pseudo_label_threshold:
    low: 0.85
    high: 0.99

